<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RealStock Queue Monitor</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f7fb;color:#0f172a;margin:0;padding:16px;font-size:17px}
    .wrap{max-width:980px;margin:0 auto}.card{background:#fff;border:1px solid #dbe4f0;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 8px 20px rgba(15,23,42,.06)}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.metric{border-radius:16px;background:#f8fafc;padding:14px}.metric b{display:block;font-size:28px}.muted{color:#64748b}button{border:0;border-radius:14px;background:#0f172a;color:#fff;padding:12px 14px;font-weight:800;margin-right:8px}button.secondary{background:#e2e8f0;color:#0f172a}pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:16px;padding:14px;overflow:auto}.error{color:#b91c1c;font-weight:800}@media(max-width:640px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}body{font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RealStock Queue Monitor</h1>
    <p class="muted">ใช้ตรวจรายการที่รอประมวลผลจาก Transaction_Queue</p>
    <div class="card">
      <button onclick="refreshQueue()">Refresh</button>
      <button onclick="processNow()" class="secondary">Process Now</button>
      <span id="msg" class="muted"></span>
    </div>
    <div class="grid">
      <div class="metric"><span class="muted">Pending</span><b id="pending">-</b></div>
      <div class="metric"><span class="muted">Processing</span><b id="processing">-</b></div>
      <div class="metric"><span class="muted">Done</span><b id="done">-</b></div>
      <div class="metric"><span class="muted">Error</span><b id="error">-</b></div>
    </div>
    <div class="card"><h2>Latest Queue Items</h2><pre id="items">Loading...</pre></div>
  </div>
<script>
const DEFAULT_API = 'https://realstock-api.koobirdza.workers.dev/realstock';
const params = new URLSearchParams(location.search);
const API = params.get('api') || localStorage.getItem('realstock.apiUrl') || DEFAULT_API;
if (params.get('api')) localStorage.setItem('realstock.apiUrl', params.get('api'));
async function getJson(q){ const r = await fetch(API + q + (q.includes('?') ? '&' : '?') + '_=' + Date.now(), {cache:'no-store'}); return r.json(); }
async function refreshQueue(){
  try{
    document.getElementById('msg').textContent='Loading...';
    const s = await getJson('?action=queueStatus');
    document.getElementById('pending').textContent=s.pending ?? 0;
    document.getElementById('processing').textContent=s.processing ?? 0;
    document.getElementById('done').textContent=s.done ?? 0;
    document.getElementById('error').textContent=s.error ?? 0;
    const it = await getJson('?action=queueItems&limit=30');
    document.getElementById('items').textContent=JSON.stringify(it.items || [], null, 2);
    document.getElementById('msg').textContent='Updated ' + new Date().toLocaleTimeString();
  }catch(e){ document.getElementById('msg').innerHTML='<span class="error">'+(e.message||e)+'</span>'; }
}
async function processNow(){
  try{ document.getElementById('msg').textContent='Processing...'; await getJson('?action=adminProcessQueue&admin=1'); await refreshQueue(); }
  catch(e){ document.getElementById('msg').innerHTML='<span class="error">'+(e.message||e)+'</span>'; }
}
refreshQueue();
</script>
</body>
</html>
