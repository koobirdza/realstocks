<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RealStock Queue Monitor</title><link rel="stylesheet" href="./styles.v54.1.2.css"></head><body><main class="app"><h1>Queue Monitor</h1><div id="status" class="message">Loading...</div><button id="refreshBtn" class="secondary">Refresh</button> <button id="processBtn" class="secondary">Process Now</button><pre id="items" class="panel"></pre></main><script type="module">import{queueStatus,queueItems,adminProcessQueue}from'./src/api.v54.1.2.js';async function load(){const s=await queueStatus();document.getElementById('status').textContent=`PENDING ${s.pending} • DONE ${s.done} • ERROR ${s.error}`;const i=await queueItems(30);document.getElementById('items').textContent=JSON.stringify(i.items,null,2)}document.getElementById('refreshBtn').onclick=load;document.getElementById('processBtn').onclick=async()=>{await adminProcessQueue();load()};load();</script></body></html>
