<!doctype html><html lang="th"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Queue Monitor</title><body><h1>Queue Monitor</h1><p id="status">Loading...</p><button onclick="processNow()">Process Now</button><button onclick="load()">Refresh</button><pre id="items"></pre><script type="module">import{queueStatus,queueItems,adminProcessQueue}from'./src/api.v53.9.js';async function load(){const s=await queueStatus();document.getElementById('status').textContent=`Pending ${s.pending} / Done ${s.done} / Error ${s.error}`;const it=await queueItems(50);document.getElementById('items').textContent=JSON.stringify(it.rows,null,2)}window.load=load;window.processNow=async()=>{await adminProcessQueue(1);await load()};load();</script></body></html>
